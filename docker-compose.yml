services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: barrio_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - barrio_storage_framework:/var/www/html/storage/framework
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_STORE=redis
      - QUEUE_CONNECTION=redis
    depends_on:
      - db
      - redis
    networks:
      - barrio_network

  nginx:
    image: nginx:stable-alpine
    container_name: barrio_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - barrio_network

  db:
    image: postgres:16-alpine
    container_name: barrio_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: barrio_planificacion
      POSTGRES_USER: barrio_user
      POSTGRES_PASSWORD: barrio_password
    ports:
      - "5432:5432"
    volumes:
      - barrio_db_data:/var/lib/postgresql/data
    networks:
      - barrio_network

  redis:
    image: redis:7-alpine
    container_name: barrio_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - barrio_network

  # Worker de colas: procesa los Jobs (ej. GenerarReporteExportable)
  # Misma imagen que "app", distinto comando de arranque.
  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: barrio_queue
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=redis
    command: php artisan queue:work --tries=3 --sleep=3
    depends_on:
      - app
      - redis
    networks:
      - barrio_network

  # Scheduler de Laravel: ejecuta el cierre automático de trimestre
  # y el aviso de vencimiento (Console/Commands programados en app/Console/Kernel.php).
  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: barrio_scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - REDIS_HOST=redis
      - CACHE_STORE=redis
    command: php artisan schedule:work
    depends_on:
      - app
      - db
    networks:
      - barrio_network

networks:
  barrio_network:
    driver: bridge

volumes:
  barrio_db_data:
  barrio_storage_framework:
